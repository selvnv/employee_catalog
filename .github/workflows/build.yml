name: Release Python Package

on:
  # Триггер на пуш с релизным тегом
  push:
    tags:
      - "v*"

jobs:
  build:
    # Сборка на раннере с ubuntu
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    # Скачать код
    - name: Checkout repository
      uses: actions/checkout@v4

    # Установить Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # Установить зависимости для сборки
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    # Собрать пакет
    - name: Build package
      run: python -m build

    # Создать релиз с файлами из каталога сборки dist/
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
          files: dist/*