name: employee_catalog

services:
  db:
    image: postgres:18
    restart: always
    ports:
      - 5432:5432
    volumes:
      - employees:/var/lib/postgresql
    env_file:
      - ./.env/postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

