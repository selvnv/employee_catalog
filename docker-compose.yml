name: employee_catalog

services:
  db:
    image: postgres:18
    restart: on-failure
    ports:
      - 5432:5432
    env_file:
      - ./.env/postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d employees"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - postgres
    volumes:
      - employeesdb:/var/lib/postgresql
      - ./schema:/docker-entrypoint-initdb.d

  dbui:
    image: dpage/pgadmin4:latest
    ports:
      - "8180:80"
    restart: unless-stopped
    env_file:
      - ./.env/pgadmin.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - postgres
    volumes:
      - pgadmin:/var/lib/pgadmin


networks:
  postgres:
    driver: bridge

volumes:
  employeesdb:
  pgadmin: